name: absensi_tk
description: A new Flutter project.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  http: ^1.2.1
  pdf: ^3.10.4
  printing: ^5.11.0
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: "^0.13.1"
  flutter_native_splash: "^2.4.0"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo1.png"
  # Menambahkan adaptive icon agar tidak ngezoom di Android modern
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo1.png"

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/logo1.png"

  android_12:
    image: "assets/logo1.png"
    color: "#FFFFFF"
    icon_background_color: "#FFFFFF"

flutter:
  uses-material-design: true
  assets:
    - assets/gambar.png
    - assets/logo.png
    - assets/logo1.png
